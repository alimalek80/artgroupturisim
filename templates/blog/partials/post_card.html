<a href="{{ post.get_absolute_url }}" class="group block bg-white rounded-3xl overflow-hidden shadow-md hover:shadow-2xl transition-all duration-300">
    <div class="relative h-56 overflow-hidden">
        {% if post.featured_image %}
        <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500">
        {% else %}
        <div class="w-full h-full bg-gradient-to-br from-slate-200 to-slate-300 flex items-center justify-center">
            <svg class="w-16 h-16 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
        </div>
        {% endif %}
        {% if post.category %}
        <div class="absolute top-4 left-4 bg-white px-4 py-2 rounded-full font-bold text-xs uppercase tracking-wider text-slate-700">
            {{ post.category.name }}
        </div>
        {% endif %}
    </div>
    <div class="p-6">
        <h3 class="text-xl font-black mb-3 text-slate-900 line-clamp-2 group-hover:text-orange-600 transition-all">
            {{ post.title }}
        </h3>
        {% if post.excerpt %}
        <p class="text-slate-600 mb-4 line-clamp-3">{{ post.excerpt }}</p>
        {% endif %}
        <div class="flex items-center justify-between text-sm">
            <span class="text-slate-500 font-bold">{{ post.published_at|date:"M d, Y" }}</span>
            <span class="text-orange-600 font-bold">{{ post.reading_time }} min read</span>
        </div>
    </div>
</a>
